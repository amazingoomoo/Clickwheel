name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          set -e
          xcodebuild \
            -project ClickWheel.xcodeproj \
            -scheme ClickWheel \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Fakesign with entitlements (TrollStore)
        run: |
          set -e
          brew install ldid
          APP="build/Build/Products/Release-iphoneos/ClickWheel.app"
          BIN="$APP/ClickWheel"
          echo "Applying entitlements with ldid..."
          ldid -S"$GITHUB_WORKSPACE/entitlements.plist" "$BIN"
          echo "=== Entitlements embedded in the binary: ==="
          ldid -e "$BIN" || true
          if ldid -e "$BIN" | grep -q "no-sandbox"; then
            echo "OK: no-sandbox entitlement is embedded."
          else
            echo "ldid did not embed entitlements — falling back to codesign."
            codesign --force --sign - --entitlements "$GITHUB_WORKSPACE/entitlements.plist" "$BIN"
            echo "=== After codesign fallback: ==="
            codesign -d --entitlements - "$BIN" 2>&1 || true
          fi

      - name: Package into IPA
        run: |
          set -e
          APP_PATH="build/Build/Products/Release-iphoneos/ClickWheel.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Build product not found at $APP_PATH"; exit 1
          fi
          mkdir -p out/Payload
          cp -R "$APP_PATH" out/Payload/
          (cd out && zip -qr ClickWheel.ipa Payload && rm -rf Payload)
          ls -la out

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClickWheel-ipa
          path: out/ClickWheel.ipa

      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          files: out/ClickWheel.ipa
        continue-on-error: true

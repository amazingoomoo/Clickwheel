name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          set -e
          xcodebuild \
            -project ClickWheel.xcodeproj \
            -scheme ClickWheel \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Fakesign with entitlements (TrollStore)
        run: |
          set -e
          APP="build/Build/Products/Release-iphoneos/ClickWheel.app"
          BIN="$APP/ClickWheel"
          ENTS="$GITHUB_WORKSPACE/entitlements.plist"
          echo "Checking for entitlements file and app binary..."
          if [ ! -f "$ENTS" ]; then
            echo "ERROR: entitlements.plist not found at repo root ($ENTS)"
            echo "Repo root contents:"; ls -la "$GITHUB_WORKSPACE"
            exit 1
          fi
          if [ ! -f "$BIN" ]; then
            echo "ERROR: app binary not found ($BIN)"; exit 1
          fi
          echo "Signing with entitlements via codesign (ad-hoc)..."
          codesign --force --sign - --entitlements "$ENTS" --timestamp=none "$BIN"
          echo "=== Entitlements now embedded in the binary: ==="
          codesign -d --entitlements :- "$BIN" 2>&1 || codesign -d --entitlements - "$BIN" 2>&1 || true

      - name: Package into IPA
        run: |
          set -e
          APP_PATH="build/Build/Products/Release-iphoneos/ClickWheel.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Build product not found at $APP_PATH"; exit 1
          fi
          mkdir -p out/Payload
          cp -R "$APP_PATH" out/Payload/
          (cd out && zip -qr ClickWheel.ipa Payload && rm -rf Payload)
          ls -la out

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClickWheel-ipa
          path: out/ClickWheel.ipa

      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          files: out/ClickWheel.ipa
        continue-on-error: true
